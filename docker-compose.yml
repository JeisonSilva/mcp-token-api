services:

  # ── instância 1 da API ────────────────────────────────────────────────────
  api1:
    build:
      context: .
      target: production
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.db
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    volumes:
      - sqlite_data:/data          # banco compartilhado entre as instâncias
    restart: unless-stopped
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3000/health',r=>{
          process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── instância 2 da API ────────────────────────────────────────────────────
  api2:
    build:
      context: .
      target: production
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.db
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3000/health',r=>{
          process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── load balancer + frontend ──────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    restart: unless-stopped

# ── volumes ───────────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
    # volume nomeado: garante que api1 e api2 acessam o mesmo arquivo SQLite.
    # SQLite com WAL mode suporta múltiplos leitores/um escritor concorrente
    # via file-locking POSIX — adequado para duas instâncias de baixo volume.
