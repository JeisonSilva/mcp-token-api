services:

  # ── frontend Angular (nginx serve estático + proxy para api-lb) ───────────
  frontend:
    build:
      context: .
      dockerfile: nginx/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-lb
    restart: unless-stopped

  # ── load balancer da API (least_conn entre api1 e api2) ──────────────────
  api-lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/api-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    restart: unless-stopped

  # ── instância 1 da API ────────────────────────────────────────────────────
  api1:
    build:
      context: .
      target: production
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.db
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3000/health',r=>{
          process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── instância 2 da API ────────────────────────────────────────────────────
  api2:
    build:
      context: .
      target: production
    environment:
      PORT: "3000"
      DATABASE_PATH: /data/app.db
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: >
        node -e "require('http').get('http://localhost:3000/health',r=>{
          process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── registro npm privado (Verdaccio) ─────────────────────────────────────
  verdaccio:
    image: verdaccio/verdaccio:5
    ports:
      - "4873:4873"
    volumes:
      - verdaccio_storage:/verdaccio/storage
      - verdaccio_conf:/verdaccio/conf
      - verdaccio_plugins:/verdaccio/plugins
    environment:
      VERDACCIO_PORT: "4873"
    restart: unless-stopped

# ── volumes ───────────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
  verdaccio_storage:
  verdaccio_conf:
  verdaccio_plugins:
