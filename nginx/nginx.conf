events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ── upstream: duas instâncias da API ─────────────────────────────────────
  upstream api_cluster {
    least_conn;
    server api1:3000;
    server api2:3000;
    keepalive 32;
  }

  # ── configurações de log ──────────────────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  'upstream=$upstream_addr';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── servidor ──────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    # ── único endpoint exposto externamente ─────────────────────────────
    location ~ ^/validate(/|$) {
      if ($request_method != POST) {
        return 405;
      }

      proxy_pass         http://api_cluster;
      proxy_http_version 1.1;

      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    # ── demais rotas da API bloqueadas externamente ──────────────────────
    location ~ ^/(auth|apikeys|users|health)(/|$) {
      return 404;
    }

    # ── frontend Angular (SPA) ────────────────────────────────────────────
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # cache para assets com hash no nome
      location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }

    # endpoint de status do nginx
    location /nginx-status {
      stub_status on;
      allow 127.0.0.1;
      deny  all;
    }
  }
}
